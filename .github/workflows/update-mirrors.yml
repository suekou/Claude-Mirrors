name: Update Claude Mirrors

on:
  schedule:
    # 14:17 JST every day.
    # Chosen after the observed Claude Code docs update window around 03:30 UTC
    # and the Claude blog Webflow publish window around 20:30 UTC.
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-claude-mirrors
  cancel-in-progress: false

jobs:
  update-mirrors:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch Claude blog posts
        run: python3 scripts/fetch_claude_blog.py

      - name: Pause between mirrors
        run: sleep 60

      - name: Fetch Claude Developer Platform docs
        run: python3 scripts/fetch_claude_docs.py

      - name: Pause between mirrors
        run: sleep 60

      - name: Fetch Claude Code docs
        run: python3 scripts/fetch_claude_code_docs.py

      - name: Commit and push updated mirrors
        id: auto-commit-action
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- \
            'blog/**/*.md' \
            'blog/blog_manifest.json' \
            'docs/*.md' \
            'docs/**/*.md' \
            'docs/docs_manifest.json' \
            'code-docs/*.md' \
            'code-docs/**/*.md' \
            'code-docs/code_docs_manifest.json'

          if git diff --cached --quiet; then
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update Claude mirrors"
          echo "changes_detected=true" >> "$GITHUB_OUTPUT"

          for attempt in 1 2 3; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              exit 0
            fi

            if [ "$attempt" = "3" ]; then
              exit 1
            fi

            git fetch origin "$GITHUB_REF_NAME:refs/remotes/origin/$GITHUB_REF_NAME"
            git rebase "origin/$GITHUB_REF_NAME"
            sleep $((attempt * 5))
          done

